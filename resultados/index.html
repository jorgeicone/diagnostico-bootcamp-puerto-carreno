<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resultados · Diagnóstico Bootcamp Puerto Carreño</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--lime:#9ec400;--lime2:#b6d92e;--orange:#f26a1b;--orange2:#d8541a;--forest:#16432e;--forest2:#1e5a3c;
   --cream:#fbf7ea;--card:#fff;--border:#ece3cf;--ink:#23311c;--muted:#7a7256;--blue:#1f7a8c;
   --display:'Baloo 2',system-ui,sans-serif;--body:'Nunito',system-ui,sans-serif}
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--body);background:var(--cream);color:var(--ink)}
  h1,h2,h3{font-family:var(--display)} button{font-family:inherit;cursor:pointer}
  .weave{height:10px;background:repeating-linear-gradient(135deg,var(--orange) 0 13px,var(--forest) 13px 26px,var(--lime) 26px 39px,var(--cream) 39px 46px)}
  .top{background:linear-gradient(120deg,var(--forest),var(--forest2));color:#fff;padding:18px 20px}
  .top .w{max-width:980px;margin:0 auto;display:flex;align-items:center;gap:13px}
  .emblem{width:42px;height:42px;border-radius:50%;display:grid;place-items:center;background:radial-gradient(circle at 30% 30%,var(--lime2),var(--lime));flex-shrink:0}
  .emblem svg{width:24px;height:24px;color:#fff}
  .top b{font-family:var(--display);font-size:1.1rem;display:block;line-height:1.05}
  .top span{font-size:.72rem;opacity:.9;font-weight:700;letter-spacing:.4px}
  .wrap{max-width:980px;margin:0 auto;padding:22px 18px 70px}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:18px}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:18px;box-shadow:0 8px 24px rgba(40,60,20,.07)}
  .kpi b{font-family:var(--display);font-size:2rem;color:var(--forest);display:block;line-height:1}
  .kpi.ini b{color:var(--blue)} .kpi.fin b{color:var(--orange)}
  .kpi span{font-size:.82rem;color:var(--muted);font-weight:700}
  .card{background:var(--card);border:1px solid var(--border);border-radius:18px;box-shadow:0 8px 24px rgba(40,60,20,.07);padding:22px;margin-bottom:18px}
  .card h2{color:var(--forest);font-size:1.15rem;margin-bottom:4px}
  .card .sub{color:var(--muted);font-weight:600;font-size:.85rem;margin-bottom:16px}
  .legend{display:flex;gap:16px;font-size:.8rem;font-weight:700;color:var(--muted);margin-bottom:12px;flex-wrap:wrap}
  .legend i{display:inline-block;width:12px;height:12px;border-radius:3px;margin-right:5px;vertical-align:middle}
  .row{margin-bottom:14px}
  .row .rt{font-weight:700;font-size:.9rem;margin-bottom:6px;display:flex;justify-content:space-between;gap:10px}
  .row .delta{font-family:var(--display);font-weight:800;font-size:.82rem;padding:1px 9px;border-radius:50px}
  .up{background:#e7f6ea;color:#2e8b46} .down{background:#fdeaea;color:#c0392b} .eq{background:#eee;color:#777}
  .barwrap{position:relative}
  .bar{height:13px;border-radius:50px;margin-bottom:5px;position:relative;background:#f0ecdd}
  .bar>div{height:100%;border-radius:50px;transition:.6s}
  .bar.ini>div{background:linear-gradient(90deg,#3ea6bb,var(--blue))}
  .bar.fin>div{background:linear-gradient(90deg,var(--lime),var(--orange))}
  .bar .v{position:absolute;right:8px;top:-3px;font-size:.72rem;font-weight:800;color:var(--forest)}
  .dimavg{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px}
  .dimavg .d{background:#f7f9ee;border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center}
  .dimavg .d .lab{font-size:.78rem;color:var(--muted);font-weight:700;margin-bottom:6px}
  .dimavg .d .nums{font-family:var(--display);font-weight:800;font-size:1.15rem}
  .dimavg .d .nums .i{color:var(--blue)} .dimavg .d .nums .f{color:var(--orange)} .dimavg .d .nums .a{font-size:.8rem}
  .demo{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  @media(max-width:640px){.demo{grid-template-columns:1fr}}
  .demo .b{display:flex;justify-content:space-between;font-size:.86rem;padding:6px 0;border-bottom:1px dashed var(--border)}
  .demo .b b{font-family:var(--body);font-weight:800;color:var(--forest)}
  .tabs{display:flex;gap:8px;margin-bottom:16px}
  .tabs button{background:#fff;border:1.6px solid var(--border);border-radius:50px;padding:9px 18px;font-family:var(--display);font-weight:700;color:var(--muted)}
  .tabs button.on{background:var(--forest);color:#fff;border-color:var(--forest)}
  .tools{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .tools button{background:#fff;border:1.6px solid var(--border);border-radius:11px;padding:10px 16px;font-weight:800;font-family:var(--display);color:var(--forest)}
  table{width:100%;border-collapse:collapse;font-size:.82rem}
  th,td{border:1px solid var(--border);padding:6px 8px;text-align:left;white-space:nowrap}
  th{background:#f1f6e3;color:var(--forest);position:sticky;top:0}
  .scroll{overflow:auto;max-height:60vh;border-radius:12px;border:1px solid var(--border)}
  .gate{max-width:360px;margin:30px auto;text-align:center}
  .gate input{width:100%;border:1.8px solid var(--border);border-radius:11px;padding:12px;margin:10px 0;font-size:1rem}
  .gate button{width:100%;background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff;border:none;border-radius:12px;padding:13px;font-family:var(--display);font-weight:800}
  .muted{color:var(--muted);font-weight:600}
</style></head>
<body>
<svg width="0" height="0" style="position:absolute"><symbol id="leaf" viewBox="0 0 64 64">
 <path d="M32 60 V30" stroke="currentColor" stroke-width="5" stroke-linecap="round" fill="none"/>
 <path d="M32 36 C19 36 11 27 11 14 C25 14 32 23 32 36 Z" fill="currentColor"/>
 <path d="M32 31 C45 31 53 22 53 9 C39 9 32 18 32 31 Z" fill="currentColor" opacity=".82"/></symbol></svg>
<div class="top"><div class="w">
  <div class="emblem"><svg><use href="#leaf"/></svg></div>
  <div><b>Diagnóstico · Resultados</b><span>BOOTCAMP PUERTO CARREÑO · UNIVERSIDAD EAN · PROYECTO CLUA</span></div>
</div></div>
<div class="weave"></div>
<div class="wrap">
  <div class="tabs"><button class="on" id="t-res" onclick="tab('res')">📊 Comparativo</button><button id="t-dat" onclick="tab('dat')">🔒 Datos individuales</button></div>
  <div id="view-res"></div>
  <div id="view-dat" style="display:none"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="panel.js?v=1"></script>
</body></html>
